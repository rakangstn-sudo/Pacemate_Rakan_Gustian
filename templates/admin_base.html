<!--
  admin_base.html
  Layout khusus halaman admin: sidebar navigasi + area konten.
  Semua template admin meng-extends template ini (bukan langsung base.html).
-->
{% extends "base.html" %}

{% block content %}
<div class="row g-4">
    <!-- ===== SIDEBAR ADMIN ===== -->
    <div class="col-md-3 col-lg-2">
        <div class="card shadow-sm">
            <div class="card-body p-2">
                <h6 class="text-uppercase text-muted small px-2 pt-1 mb-2">Menu Admin</h6>
                <nav class="nav flex-column">
                    <a class="nav-link {{ 'active fw-bold' if active_menu == 'dashboard' else '' }}"
                       href="{{ url_for('admin_dashboard') }}">
                        📊 Dashboard
                    </a>
                    <a class="nav-link {{ 'active fw-bold' if active_menu == 'pelari' else '' }}"
                       href="{{ url_for('admin_pelari_list') }}">
                        🏃 Kelola Pelari
                    </a>
                    <a class="nav-link {{ 'active fw-bold' if active_menu == 'sesi' else '' }}"
                       href="{{ url_for('admin_sesi_list') }}">
                        📝 Kelola Sesi
                    </a>
                    <a class="nav-link {{ 'active fw-bold' if active_menu == 'risiko' else '' }}"
                       href="{{ url_for('admin_risiko') }}">
                        ⚠️ Deteksi Risiko
                    </a>
                    <hr class="my-2">
                    <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                        🔓 Logout
                    </a>
                </nav>
            </div>
        </div>
    </div>

    <!-- ===== KONTEN UTAMA ===== -->
    <div class="col-md-9 col-lg-10">
        {% block admin_content %}{% endblock %}
    </div>
</div>
{% endblock %}
