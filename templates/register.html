{% extends "base.html" %}

{% block title %}Register Pelari{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4">Daftar Akun Pelari</h4>

                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <hr>

                    <div class="mb-3">
                        <label for="nama" class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control" id="nama" name="nama" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="usia" class="form-label">Usia (tahun)</label>
                            <input type="number" class="form-control" id="usia" name="usia" min="1" max="120" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="level" class="form-label">Level</label>
                            <select class="form-select" id="level" name="level" required>
                                <option value="" disabled selected>-- Pilih --</option>
                                <option value="pemula">Pemula</option>
                                <option value="menengah">Menengah</option>
                                <option value="lanjutan">Lanjutan</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="pr_5k_menit" class="form-label">PR 5K (menit) — untuk prediksi jadwal</label>
                        <input type="number" step="0.01" min="10" max="60" class="form-control"
                               id="pr_5k_menit" name="pr_5k_menit" placeholder="contoh: 25.5" required>
                        <div class="form-text">Batas realistis: 10 - 60 menit.</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Daftar Sekarang</button>
                    
                    <div class="mt-3 text-center small">
                        Sudah punya akun? <a href="{{ url_for('login') }}">Login di sini</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
